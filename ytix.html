<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTIX Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1e2530;
      --border: rgba(99,230,214,0.1);
      --border-hover: rgba(99,230,214,0.28);
      --text: #e6f4f1;
      --muted: #6b8f8a;
      --accent: #2dd4bf;
      --accent-bright: #5eead4;
      --accent-dim: rgba(45,212,191,0.12);
      --accent-x: #67e8f9;
      --accent-yt: #f87171;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 14px; line-height: 1.6; }
    body { display: flex; flex-direction: column; align-items: center; padding: 4rem 1.5rem 6rem; }
    .container { width: 100%; max-width: 600px; }
    .eyebrow { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; opacity: 0.8; }
    .title { font-family: var(--font-display); font-size: clamp(48px, 14vw, 80px); font-weight: 800; line-height: 1.0; letter-spacing: -0.03em; }
    .title .yt { color: var(--accent-yt); }
    .title .i { color: var(--accent-bright); }
    .title .x { color: var(--accent-x); }
    .subtitle { font-size: 13px; color: var(--muted); margin-top: 10px; letter-spacing: 0.04em; }
    .subtitle span { color: var(--text); }
    .byline { margin-top: 8px; font-size: 12px; color: var(--muted); letter-spacing: 0.06em; }
    .byline span { color: var(--accent-bright); font-weight: 500; }
    .deco-line { width: 40px; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); border-radius: 2px; margin: 1.5rem 0; }
    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tab { font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; padding: 9px 16px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; transition: color 0.2s, border-color 0.2s; margin-bottom: -1px; text-transform: uppercase; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent-bright); border-bottom-color: var(--accent); }
    .tab.active.x-tab { color: var(--accent-x); border-bottom-color: var(--accent-x); }
    .tab.active.yt-tab { color: var(--accent-yt); border-bottom-color: var(--accent-yt); }
    .input-group { display: flex; gap: 8px; margin-bottom: 1rem; }
    .url-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 12px 16px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,212,191,0.08); }
    .fetch-btn { font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; background: var(--accent); color: #0d1117; border: none; border-radius: 8px; padding: 12px 22px; cursor: pointer; white-space: nowrap; transition: background 0.2s, transform 0.1s; }
    .fetch-btn:hover { background: var(--accent-bright); }
    .fetch-btn:active { transform: scale(0.97); }
    .fetch-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .yt-options { display: none; gap: 8px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
    .yt-options.visible { display: flex; }
    .yt-options label { font-size: 12px; color: var(--muted); }
    .yt-options select { font-family: var(--font-mono); font-size: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; outline: none; cursor: pointer; }
    .yt-options select:focus { border-color: var(--accent-yt); }
    .status { font-size: 12px; color: var(--muted); margin-bottom: 0.75rem; display: none; align-items: center; gap: 8px; }
    .status.visible { display: flex; }
    .status.error { color: #f87171; }
    .spinner { width: 13px; height: 13px; border: 1.5px solid rgba(45,212,191,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.55s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem 1.25rem; margin-bottom: 0.75rem; animation: fadeUp 0.25s ease; position: relative; overflow: hidden; }
    .result-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent-x)); }
    .result-card.yt::before { background: linear-gradient(90deg, var(--accent-yt), #fbbf24); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .result-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; opacity: 0.8; }
    .result-card.yt .result-label { color: var(--accent-yt); }
    .dl-link { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--accent-bright); background: var(--accent-dim); border: 1px solid rgba(45,212,191,0.2); border-radius: 7px; padding: 9px 16px; text-decoration: none; transition: background 0.2s, border-color 0.2s; }
    .dl-link:hover { background: rgba(45,212,191,0.18); border-color: rgba(45,212,191,0.4); }
    .dl-link.yt-dl { color: var(--accent-yt); background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.2); }
    .dl-link.yt-dl:hover { background: rgba(248,113,113,0.18); border-color: rgba(248,113,113,0.4); }
    .dl-link svg { width: 15px; height: 15px; flex-shrink: 0; }
    .footer { margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 1.5rem; font-size: 11px; color: var(--muted); line-height: 1.8; }
  </style>
</head>
<body>
<main class="container" role="main">
  <header style="margin-bottom:3rem;">
    <p class="eyebrow">Video Downloader</p>
    <h1 class="title">
      <span class="yt">YT</span><span class="i">I</span><span class="x">X</span>
    </h1>
    <p class="subtitle"><span>YouTube</span> &middot; <span>Instagram</span> &middot; <span>Twitter / X</span></p>
    <div class="deco-line"></div>
    <p class="byline">by <span>engqusai</span> &mdash; no ads, no sign-in, public posts only</p>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab active" id="tab-instagram" onclick="setTab('instagram')">&#9679; Instagram</button>
    <button class="tab x-tab" id="tab-twitter" onclick="setTab('twitter')">&#9679; Twitter / X</button>
    <button class="tab yt-tab" id="tab-youtube" onclick="setTab('youtube')">&#9679; YouTube</button>
  </div>

  <div class="yt-options" id="yt-options">
    <label>Quality:</label>
    <select id="yt-quality">
      <option value="max">Best available</option>
      <option value="1080">1080p</option>
      <option value="720">720p</option>
      <option value="480">480p</option>
      <option value="360">360p</option>
    </select>
    <label style="margin-left:8px;">Audio only:</label>
    <select id="yt-audio">
      <option value="false">No — video + audio</option>
      <option value="true">Yes — MP3 only</option>
    </select>
  </div>

  <div class="input-group">
    <input class="url-input" type="url" id="url-input" placeholder="https://www.instagram.com/reel/..." aria-label="Video URL" autocomplete="off" spellcheck="false" />
    <button class="fetch-btn" id="dl-btn" onclick="fetchVideo()">Download &#8595;</button>
  </div>

  <div class="status" id="status" role="status" aria-live="polite"></div>
  <div id="results"></div>

  <footer class="footer">
    <p>Independent downloader. No ads, no redirects. Supports public Instagram Reels, Twitter/X videos, and YouTube videos &amp; audio.</p>
  </footer>
</main>

<script>
  let currentTab = 'instagram';

  const placeholders = {
    instagram: 'https://www.instagram.com/reel/...',
    twitter: 'https://twitter.com/... or https://x.com/...',
    youtube: 'https://www.youtube.com/watch?v=... or https://youtu.be/...'
  };

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('url-input').placeholder = placeholders[tab];
    document.getElementById('yt-options').className = tab === 'youtube' ? 'yt-options visible' : 'yt-options';
    setStatus('');
    document.getElementById('results').innerHTML = '';
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    if (!msg) { el.className = 'status'; return; }
    el.className = 'status visible ' + (type || '');
    el.innerHTML = type === 'loading'
      ? `<span class="spinner" aria-hidden="true"></span>${msg}`
      : msg;
  }

  function dlIcon() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
  }

  async function fetchVideo() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) { setStatus('Paste a URL first.', 'error'); return; }

    const isInstagram = url.includes('instagram.com');
    const isTwitter = url.includes('twitter.com') || url.includes('x.com');
    const isYoutube = url.includes('youtube.com') || url.includes('youtu.be');

    if (!isInstagram && !isTwitter && !isYoutube) {
      setStatus('Not recognized — use an Instagram, Twitter/X, or YouTube link.', 'error');
      return;
    }

    const isAudioOnly = isYoutube && document.getElementById('yt-audio').value === 'true';
    const quality = isYoutube ? document.getElementById('yt-quality').value : 'max';

    document.getElementById('results').innerHTML = '';
    document.getElementById('dl-btn').disabled = true;
    setStatus('Fetching download link&hellip;', 'loading');

    try {
      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, vQuality: quality, isAudioOnly })
      });

      const data = await res.json();
      console.log('API response:', JSON.stringify(data));
      document.getElementById('dl-btn').disabled = false;

      if (data.status === 'error') {
        const msg = data.error?.code || data.error || data.text || 'Could not fetch. Post may be private or age-restricted.';
        setStatus(typeof msg === 'object' ? JSON.stringify(msg) : msg, 'error');
        return;
      }

      setStatus('');
      const platform = isInstagram ? 'Instagram' : isTwitter ? 'Twitter / X' : 'YouTube';

      if (data.status === 'tunnel' || data.status === 'redirect' || data.status === 'stream') {
        const label = isAudioOnly ? 'Download audio (MP3)' : 'Download video';
        document.getElementById('results').innerHTML = `
          <div class="result-card ${isYoutube ? 'yt' : ''}">
            <p class="result-label">${platform} &mdash; ready</p>
            <a class="dl-link ${isYoutube ? 'yt-dl' : ''}" href="${data.url}" target="_blank" rel="noopener noreferrer">
              ${dlIcon()} ${label}
            </a>
          </div>`;
      } else if (data.status === 'picker') {
        document.getElementById('results').innerHTML = data.picker.map((item, i) => `
          <div class="result-card ${isYoutube ? 'yt' : ''}">
            <p class="result-label">${platform} &mdash; ${item.type === 'photo' ? 'Image' : 'Video'} ${i + 1} of ${data.picker.length}</p>
            <a class="dl-link ${isYoutube ? 'yt-dl' : ''}" href="${item.url}" target="_blank" rel="noopener noreferrer">
              ${dlIcon()} Download ${item.type === 'photo' ? 'image' : 'clip'}
            </a>
          </div>`).join('');
      } else {
        setStatus('Unexpected response. Content may not be downloadable.', 'error');
      }
    } catch (e) {
      document.getElementById('dl-btn').disabled = false;
      setStatus('Network error. Try again in a moment.', 'error');
    }
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchVideo();
  });
</script>
</body>
</html>
